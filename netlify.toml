# Redefine Roofing — Netlify configuration

[build]
  publish = "."

# Legacy single-page URLs -> new permanent homes
[[redirects]]
  from = "/blog-post.html"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/blog.html"
  to = "/blog/"
  status = 301

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
